<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Śteeł</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css"><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body><div class="app-shell"><header class="hero"><div class="brand">Śteeł</div><div class="subbrand">sniper</div></header><main class="app"><section class="page active" id="tabSearch"><div class="panel"><div class="panel-head"><div><h1>Searches</h1><p>Dark luxury Vinted sniper</p></div><span class="pill">up to 5</span></div><form id="searchForm" autocomplete="off" class="form"><div class="field"><label>Brand / Query</label><input id="query" type="text" placeholder="Zara, Nike, Carhartt..." maxlength="120" required></div><div class="field"><label>Countries</label><div id="regionGrid" class="regions"></div></div><div class="row-2"><div class="field"><label>Category</label><select id="category"><option value="all">All</option><option value="clothes">Clothes</option><option value="shoes">Shoes</option></select></div><div class="field"><label>Size</label><input id="size" type="text" placeholder="M, L, 36.5, 42"></div></div><div class="row-3"><div class="field"><label>Min price</label><input id="min_price" type="number" min="0" placeholder="0"></div><div class="field"><label>Max price</label><input id="max_price" type="number" min="0" placeholder="500"></div><div class="field"><label>Exclude</label><input id="minus_words" type="text" placeholder="kids, fake"></div></div><div class="actions"><button type="button" id="cancelBtn" class="ghost hidden">Cancel</button><button type="submit" id="submitBtn" class="primary">Create Search</button></div></form></div></section><section class="page" id="tabProfile"><div class="panel"><div class="panel-head"><div><h1>Active searches</h1><p>Manage your watchlist</p></div><span class="pill" id="sCnt">0</span></div><div id="sList"></div></div></section></main><nav class="bar"><button class="tab active" data-tab="tabSearch">Search</button><button class="tab" data-tab="tabProfile">Profile</button></nav></div><div class="toast hidden" id="toast"></div><script src="app.js"></script></body></html>
