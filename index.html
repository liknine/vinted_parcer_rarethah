<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Sniper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="app">

  <!-- SEARCH -->
  <div class="page active" id="tabSearch">
    <div class="hdr"><h1>Поиск</h1><p class="sub">Создай засаду на любую вещь</p></div>
    <div class="glass" id="formCard">
      <div class="glass-top">
        <span class="glass-t" id="formTitle">Новая засада</span>
        <button class="x hidden" id="cancelBtn" type="button">&times;</button>
      </div>
      <form id="searchForm" autocomplete="off">
        <div class="f"><label>Запрос</label><input id="query" type="text" placeholder="bape tiger, nike dunk..." maxlength="120" required><span class="hint">Бот подберёт варианты</span></div>
        <div class="f"><label>Регионы</label><div class="regions" id="regionGrid"></div></div>
        <div class="g2"><div class="f"><label>Категория</label><select id="category"><option value="all">Все</option><option value="clothes">Одежда</option><option value="shoes">Обувь</option></select></div>
        <div class="f"><label>Размер</label><input id="size" type="text" placeholder="M, L, XL / 42"></div></div>
        <div class="g3"><div class="f"><label>Мин. цена</label><input id="min_price" type="number" min="0" placeholder="0"></div>
        <div class="f"><label>Макс. цена</label><input id="max_price" type="number" min="0" placeholder="500"></div>
        <div class="f"><label>Исключить</label><input id="minus_words" type="text" placeholder="kids, fake"></div></div>
        <div class="f"><label>Состояние</label><div class="chips" id="condChips"></div></div>
        <button type="submit" class="main-btn" id="submitBtn">Создать засаду</button>
      </form>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="page" id="tabProfile">
    <div class="hdr"><h1>Профиль</h1><p class="sub">Аккаунт и засады</p></div>
    <div class="glass ava-card">
      <div class="ava" id="ava"><span id="avaL">?</span><img id="avaI" class="hidden" alt=""></div>
      <div class="ava-n" id="pName">—</div>
      <div class="ava-u" id="pUser">—</div>
    </div>
    <div class="mets">
      <div class="met"><span class="met-l">ID</span><span class="met-v" id="sId">—</span></div>
      <div class="met"><span class="met-l">Засад</span><span class="met-v" id="sCount">—</span></div>
    </div>
    <div class="glass">
      <div class="glass-top"><span class="glass-t">Активные засады</span><span class="badge" id="sCnt">0</span></div>
      <div id="sList"></div>
    </div>
    <div class="glass cta">
      <div><div class="cta-t">Для выкупа пиши мне!</div><div class="cta-s">Помогу забрать любую вещь</div></div>
      <button class="main-btn sm" id="contactBtn">Написать</button>
    </div>
  </div>

  <nav class="bar">
    <button class="tab active" data-tab="tabSearch">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <span>Поиск</span>
    </button>
    <button class="tab" data-tab="tabProfile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Профиль</span>
    </button>
  </nav>
</div>
<div class="toast hidden" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
