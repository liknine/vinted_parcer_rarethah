<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sniper</title><link rel="stylesheet" href="style.css"><script src="https://telegram.org/js/telegram-web-app.js"></script></head>
<body><div class="app"><div class="page active" id="tabSearch"><div class="hdr"><h1>Поиск</h1><p class="sub">HTML parsing · до 5 поисков</p></div><div class="glass" id="formCard"><div class="glass-top"><span class="glass-t" id="formTitle">Новый поиск</span><button class="x hidden" id="cancelBtn" type="button">&times;</button></div><form id="searchForm" autocomplete="off"><div class="f"><label>Запрос</label><input id="query" type="text" placeholder="zara, nike dunk..." maxlength="120" required></div><div class="f"><label>Страны</label><div class="regions" id="regionGrid"></div></div><div class="g2"><div class="f"><label>Категория</label><select id="category"><option value="all">Все</option><option value="clothes">Одежда</option><option value="shoes">Обувь</option></select></div><div class="f"><label>Размер</label><input id="size" type="text" placeholder="M, L, XL / 42"></div></div><div class="g3"><div class="f"><label>Мин. цена</label><input id="min_price" type="number" min="0" placeholder="0"></div><div class="f"><label>Макс. цена</label><input id="max_price" type="number" min="0" placeholder="500"></div><div class="f"><label>Исключить</label><input id="minus_words" type="text" placeholder="kids, fake"></div></div><button type="submit" class="main-btn" id="submitBtn">Создать поиск</button></form></div></div><div class="page" id="tabProfile"><div class="hdr"><h1>Профиль</h1><p class="sub">Активные поиски</p></div><div class="glass"><div class="glass-top"><span class="glass-t">Активные поиски</span><span class="badge" id="sCnt">0</span></div><div id="sList"></div></div></div><nav class="bar"><button class="tab active" data-tab="tabSearch"><span>Поиск</span></button><button class="tab" data-tab="tabProfile"><span>Профиль</span></button></nav></div><div class="toast hidden" id="toast"></div><script src="app.js"></script></body></html>
